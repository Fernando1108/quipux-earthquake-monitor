services:
  mongodb:
    image: mongo:7
    container_name: quipux-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - quipux_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    image: quipux-earthquake-monitor-app:latest
    container_name: quipux-api
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - quipux_network
    restart: unless-stopped

  ingestion-worker:
    build: .
    image: quipux-earthquake-monitor-app:latest
    container_name: quipux-ingestion-worker
    command:
      - python
      - -m
      - app.workers.ingestion_worker
    env_file:
      - path: .env.example
        required: true
      - path: .env
        required: false
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - quipux_network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  quipux_network:
